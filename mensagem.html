<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerar Report Bloqueio WhatsApp</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
  <div class="container">
    <button type="button" class="btn-secondary" style="margin-bottom: 20px;" onclick="window.location.href='index.html'">← Voltar à Matriz</button>
    <h1>Gerar Report Bloqueio</h1>

    <form onsubmit="return false;">
      <label for="numero">Número WhatsApp</label>
      <input type="tel" id="numero" placeholder="+351 912 345 678 (P/ validar insira o seu!)" inputmode="tel">

      <label for="pos_caixa">POS (Caixa)</label>
      <input type="text" id="pos_caixa" placeholder="Digite o número do POS/Caixa">

      <label for="loja">Número da Loja</label>
      <input type="text" id="loja" placeholder="Digite o número da loja">

      <label for="imagem_encomenda">Extrair Encomenda da Imagem:</label>
      <input type="file" id="imagem_encomenda" accept="image/*" style="margin-bottom: 10px;">
      <div id="ocr-status" style="margin-bottom: 10px; font-size: 0.9em; color: #555;"></div>
      <div id="ocr-botoes" style="display: none; margin-bottom: 15px;">
        <p style="margin-top: 0; margin-bottom: 5px; font-size: 0.9em;">Escolha os dados a utilizar:</p>
        <button type="button" class="btn-primary" id="btn-extrair-6" style="margin-bottom: 5px;">Extrair 6 últimos</button>
        <button type="button" class="btn-secondary" id="btn-extrair-tudo">Extrair Tudo</button>
      </div>

      <label for="encomenda">Encomenda:</label>
      <input
        type="tel"
        id="encomenda"
        name="encomenda"
        placeholder="Ex: 00035625 / 530729"
        required
        inputmode="numeric"
      />
      <small id="erro-encomenda" style="color:red; display:none;">
      ⚠️ O número após a barra deve ter exatamente 6 dígitos.
      </small>

      <label for="bloqueio">Tipo de Bloqueio</label>
      <select id="bloqueio" onchange="mostrarOutro()">
        <option value="">-- Selecione o tipo de bloqueio --</option>
        <option>Erro "encomenda em processamento"</option>
        <option>O valor do pedido é superior ao valor permitido</option>
        <option>Erro de duplicidade</option>
        <option>Artigo inexistente</option>
        <option>Erro descohecido</option>
        <option>Outro (especificar abaixo)</option>
      </select>

      <div id="bloqueioOutroWrapper" style="display: none;">
        <label for="bloqueioOutroInput" class="visually-hidden">Especifique o tipo de bloqueio</label>
        <input type="text" id="bloqueioOutroInput" placeholder="Digite o tipo de bloqueio">
      </div>

      <label for="substituicao">Houve substituição?</label>
      <select id="substituicao" onchange="mostrarDescricaoSubstituicao()">
        <option value="">-- Selecione --</option>
        <option>Sim, teve substituição</option>
        <option>Não teve substituição</option>
        <option>Não teve substituição mas quero adicionar nota/descrição</option>
      </select>

      <div id="detalhesSubstituicaoWrapper" style="display: none;">
        <label for="detalhesSubstituicaoInput" class="visually-hidden">Detalhes da substituição ou nota adicional</label>
        <textarea id="detalhesSubstituicaoInput" placeholder="Descreva os artigos substituídos ou a nota adicional..."></textarea>
      </div>

      <label for="ticket">Ticket</label>
      <input type="number" id="ticket" placeholder="1832377" inputmode="numeric">

      <button type="button" class="btn-whatsapp" onclick="gerarMensagem()">Gerar Mensagem</button>
      <button type="button" class="btn-primary" onclick="enviarWhatsApp()">Abrir no WhatsApp</button>
      <button type="button" class="btn-secondary" onclick="enviarEmail()">Enviar por E-mail</button>
    </form>

    <h3>Prévia da Mensagem:</h3>
    <pre id="preview" aria-live="polite"></pre>

    <div class="visually-hidden" aria-live="polite" id="status-announcer"></div>
  </div>

  <script>
    let mensagemGerada = "";

    function mostrarOutro() {
      const select = document.getElementById("bloqueio");
      const outroCampoWrapper = document.getElementById("bloqueioOutroWrapper");
      const outroCampoInput = document.getElementById("bloqueioOutro");
      if (select.value === "Outro (especificar abaixo)") {
        outroCampoWrapper.style.display = "block";
        outroCampoInput.focus();
      } else {
        outroCampoWrapper.style.display = "none";
        outroCampoInput.value = "";
      }
    }

    function mostrarDescricaoSubstituicao() {
      const select = document.getElementById("substituicao");
      const campoDescricaoWrapper = document.getElementById("detalhesSubstituicaoWrapper");
      const campoDescricaoTextarea = document.getElementById("detalhesSubstituicao");
      if (
        select.value === "Sim, teve substituição" ||
        select.value === "Não teve substituição mas quero adicionar nota/descrição"
      ) {
        campoDescricaoWrapper.style.display = "block";
        campoDescricaoTextarea.focus();
      } else {
        campoDescricaoWrapper.style.display = "none";
        campoDescricaoTextarea.value = "";
      }
    }

    function gerarMensagem() {
      const posCaixa = document.getElementById("pos_caixa").value;
      const loja = document.getElementById("loja").value;
      const encomenda = document.getElementById("encomenda").value;
      let bloqueio = document.getElementById("bloqueio").value;
      const bloqueioOutro = document.getElementById("bloqueioOutroInput").value;
      const substituicao = document.getElementById("substituicao").value;
      const detalhes = document.getElementById("detalhesSubstituicaoInput").value;
      const ticket = document.getElementById("ticket").value;

      if (bloqueio === "Outro (especificar abaixo)" && bloqueioOutro.trim() !== "") {
        bloqueio = bloqueioOutro;
      }

      let textoSubstituicao = substituicao;
      if (detalhes.trim() !== "") {
        textoSubstituicao += `\n\n${detalhes}`;
      }

      const agora = new Date();
      const horas = String(agora.getHours()).padStart(2, '0');
      const minutos = String(agora.getMinutes()).padStart(2, '0');
      const horaFormatada = `${horas}:${minutos}`;

      mensagemGerada =
`Report Bloqueio

POS (Caixa): ${posCaixa}
Loja: ${loja}
Encomenda: ${encomenda}
Tipo do Bloqueio: ${bloqueio}
Substituição: ${textoSubstituicao}

Já contactado o 2370 - ${horaFormatada}

Ticket: ${ticket}`;

      document.getElementById("preview").innerText = mensagemGerada;
      const announcer = document.getElementById('status-announcer');

      navigator.clipboard.writeText(mensagemGerada).then(() => {
        const botao = document.querySelector("button[onclick='gerarMensagem()']");
        const textoOriginal = botao.innerText;
        botao.innerText = "Copiado!";
        setTimeout(() => {
          botao.innerText = textoOriginal;
        }, 2000);
        announcer.textContent = 'Mensagem copiada para a área de transferência.';
        setTimeout(() => { announcer.textContent = '' }, 3000);

      }).catch(err => {
        console.error("Erro ao copiar a mensagem: ", err);
        announcer.textContent = 'Ocorreu um erro ao copiar a mensagem.';
        setTimeout(() => { announcer.textContent = '' }, 3000);
        alert("Ocorreu um erro ao copiar a mensagem.");
      });
    }

    function enviarWhatsApp() {
      const numero = document.getElementById("numero").value;
      if (!numero || !mensagemGerada) {
        alert("Preencha o número e gere a mensagem antes de enviar!");
        return;
      }
      const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagemGerada)}`;
      window.open(url, "_blank");
    }

    function enviarEmail() {
      if (!mensagemGerada) {
        alert("Gere a mensagem antes de enviar por e-mail!");
        return;
      }

      const to = "2370@jeronimo-martins.com";
      const encomenda = document.getElementById("encomenda").value;
      const subject = `Report Bloqueio - Encomenda ${encomenda}`;
      const body = mensagemGerada;

      const mailtoLink = `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      window.open(mailtoLink, "_blank");
    }

    document.getElementById("numero").addEventListener("input", function(e) {
      let valor = e.target.value.replace(/\D/g, "");
      if(valor.startsWith("351")) {
        valor = "+" + valor.replace(/^351/, "351 ");
      } else if(valor.startsWith("55")) {
        valor = "+" + valor.replace(/^55/, "55 ");
      }
      valor = valor.replace(/(\+\d{2,3})(\d{3})(\d{3})(\d{3})$/, "$1 $2 $3 $4");
      e.target.value = valor;
    });

    document.getElementById("encomenda").addEventListener("input", function(e) {
      let valor = e.target.value.replace(/\D/g, "");
      if (valor.length > 8) {
        valor = valor.slice(0, 8) + " / " + valor.slice(8);
      }
      e.target.value = valor;
    });

    document.getElementById("ticket").addEventListener("input", function(e) {
      e.target.value = e.target.value.replace(/\D/g, ""); 
    });

    const campoEncomenda = document.getElementById("encomenda");
    const erro = document.getElementById("erro-encomenda");

    campoEncomenda.addEventListener("input", function(e) {
        let valor = e.target.value.replace(/[^0-9/]/g, ""); // só números e "/"

        if (valor.includes("/")) {
        let [antes, depois] = valor.split("/");
        antes = antes.trim();
        depois = depois.trim();
        depois = depois.slice(0, 6);
        valor = antes + " / " + depois;

        if (depois.length === 6) {
            erro.style.display = "none";
            campoEncomenda.setCustomValidity("");
        } else {
            erro.style.display = "block";
            campoEncomenda.setCustomValidity("O número após a barra deve ter exatamente 6 dígitos.");
        }
        }
        e.target.value = valor;
    });

    // Lógica para OCR (Tesseract.js)
    const imagemInput = document.getElementById("imagem_encomenda");
    const ocrStatus = document.getElementById("ocr-status");
    const ocrBotoes = document.getElementById("ocr-botoes");
    const btnExtrairTudo = document.getElementById("btn-extrair-tudo");
    const btnExtrair6 = document.getElementById("btn-extrair-6");

    let extractedData = null;

    imagemInput.addEventListener("change", async function(e) {
      if (e.target.files.length === 0) return;
      const file = e.target.files[0];

      ocrStatus.innerText = "Lendo imagem, aguarde...";
      ocrBotoes.style.display = "none";
      extractedData = null;

      try {
        const worker = await Tesseract.createWorker('por', 1, {
            workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js',
            corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core.wasm.js'
        });
        const ret = await worker.recognize(file);
        const text = ret.data.text;
        await worker.terminate();

        console.log("Texto extraído:", text);

        // Regex para capturar Encomenda #00152366/773536
        // Tesseract might output * instead of # sometimes.
        const match = text.match(/Encomenda\s*[*#]?\s*([0-9]+)\s*\/\s*([0-9]+)/i);

        if (match) {
          const parte1 = match[1];
          const parte2 = match[2];
          extractedData = { parte1, parte2 };

          ocrStatus.innerText = `Encontrado: ${parte1} / ${parte2}`;
          ocrBotoes.style.display = "block";
        } else {
          ocrStatus.innerText = "Não foi possível encontrar o número da encomenda na imagem.";
        }

      } catch (err) {
        console.error("Erro no OCR:", err);
        ocrStatus.innerText = "Erro ao processar a imagem.";
      }
    });

    btnExtrairTudo.addEventListener("click", function() {
      if (extractedData) {
        const fullNumber = extractedData.parte1 + "/" + extractedData.parte2;
        campoEncomenda.value = fullNumber;
        campoEncomenda.dispatchEvent(new Event('input'));
        ocrStatus.innerText = "Número completo aplicado com sucesso!";
        ocrBotoes.style.display = "none";
      }
    });

    btnExtrair6.addEventListener("click", function() {
      if (extractedData) {
        campoEncomenda.value = extractedData.parte2;
        campoEncomenda.dispatchEvent(new Event('input'));
        ocrStatus.innerText = "Últimos 6 dígitos aplicados com sucesso!";
        ocrBotoes.style.display = "none";
      }
    });

  </script>
</body>
</html>
